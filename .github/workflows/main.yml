name: Build & Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-submit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios:
    name: iOS → TestFlight
    runs-on: macos-26 # matches local Xcode 26 / iOS 26 SDK
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS .ipa locally
        run: |
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output ./build.ipa

      - name: Submit to TestFlight
        run: |
          eas submit \
            --platform ios \
            --path ./build.ipa \
            --profile production \
            --non-interactive

  android:
    name: Android → Play Internal
    if: false # temporarily disabled
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android .aab locally
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ./build.aab

      - name: Submit to Play Console
        run: |
          eas submit \
            --platform android \
            --path ./build.aab \
            --profile production \
            --non-interactive
